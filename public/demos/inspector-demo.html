<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inspector Panel Demo</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="ui-app-shell">
      <aside class="ui-sidebar">
        <h1>Inspector Demo</h1>
        <p>右侧面板模块独立 mock 页面。</p>
      </aside>

      <main class="ui-workbench">
        <section class="ui-panel">
          <h2>无选择</h2>
          <div id="emptyInspector"></div>
        </section>

        <section class="ui-panel">
          <h2>单选组件</h2>
          <div id="singleInspector"></div>
        </section>

        <section class="ui-panel">
          <h2>多选组件</h2>
          <div id="multiInspector"></div>
        </section>
      </main>

      <aside class="ui-inspector">
        <div id="revisionTimeline"></div>
        <p id="revisionSelection" class="ui-status-line"></p>
      </aside>
    </div>

    <script type="module">
      import { createInspectorViewModel, renderInspectorPanel } from '/modules/inspectorPanel.js';
      import { createRevisionViewModel, renderRevisionPanel } from '/modules/revisionPanel.js';

      const currentNode = {
        id: 'root',
        title: '汇报总览',
        status: { source: 'sourced', display: 'visible' }
      };

      const baseInput = {
        reportId: 'demo-report',
        reportTitle: 'Demo 汇报',
        currentRevision: 'rev-002',
        currentNode
      };

      renderInspectorPanel(
        document.querySelector('#emptyInspector'),
        createInspectorViewModel({
          ...baseInput,
          currentRevision: null,
          selectedComponents: [],
          dirty: false
        })
      );

      renderInspectorPanel(
        document.querySelector('#singleInspector'),
        createInspectorViewModel({
          ...baseInput,
          selectedComponents: [
            {
              id: 'text-001',
              type: 'text',
              x: 120,
              y: 160,
              width: 420,
              height: 120,
              source_status: 'manual'
            }
          ],
          dirty: true
        })
      );

      renderInspectorPanel(
        document.querySelector('#multiInspector'),
        createInspectorViewModel({
          ...baseInput,
          selectedComponents: [
            { id: 'text-001', type: 'text' },
            { id: 'chart-001', type: 'chart' },
            { id: 'svg-001', type: 'svg' }
          ],
          dirty: false
        })
      );

      const revisionModel = createRevisionViewModel({
        currentRevision: 'rev-002',
        revisions: [
          {
            id: 'rev-001',
            parent_revision: null,
            summary: '第一次保存',
            created_at: '2026-05-30T10:00:00+08:00'
          },
          {
            id: 'rev-002',
            parent_revision: 'rev-001',
            summary: '调整布局',
            created_at: '2026-05-30T10:05:00+08:00'
          }
        ]
      });

      renderRevisionPanel(document.querySelector('#revisionTimeline'), revisionModel, {
        onSelectRevision(revisionId) {
          document.querySelector('#revisionSelection').textContent =
            revisionId === null ? '已选择 base' : `已选择 ${revisionId}`;
        }
      });
    </script>
  </body>
</html>
