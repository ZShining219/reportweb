report:
  id: 2026-05-17-weekly-progress
  title: ReportWebShow Demo 汇报
  type: progress_report
  created_at: 2026-05-17T15:30:00+08:00
  updated_at: 2026-05-17T15:30:00+08:00
  audience: 导师
  presenter: 研究生

sources:
  - source_id: dialog-001
    note: 用户确认 demo 需要呈现清晰、功能明确、数据结构干净。
  - source_id: design-doc-001
    note: 设计文档确立 reports、patches、revision、树形导航和本地保存规则。

story_tree:
  root: root
  nodes:
    - id: root
      title: 汇报入口
      parent: null
      children:
        - progress
        - next-plan
      status:
        content: reviewed
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 项目定位来自设计文档。
      summary: 用一个本地 Web 汇报板展示数据树、呈现页和可保存编辑。
      speaker_note: 从项目目标切入，说明 demo 不是 PPT，而是可编辑的数据驱动展示。

    - id: progress
      title: 当前进展
      parent: root
      children:
        - data-model
        - presentation-model
      status:
        content: reviewed
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 当前进展来自已沉淀的设计文档。
      summary: 已确立 reports + patches 的数据层，以及节点到画布的呈现关系。
      speaker_note: 先讲已经固定下来的结构，再进入数据和呈现两个分支。

    - id: data-model
      title: 数据层结构
      parent: progress
      children: []
      status:
        content: reviewed
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 本节点总结本地保存体系规范。
      summary: report_id 区分汇报项目，revision_id 区分保存版本，patches 记录用户修改。
      speaker_note: 强调基础数据不被前端普通编辑覆盖。

    - id: presentation-model
      title: 呈现侧结构
      parent: progress
      children: []
      status:
        content: draft
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 本节点总结呈现侧模块。
      summary: 一个树节点对应一个呈现页，页面由 text block 和 svg block 组成。
      speaker_note: 说明 SVG 组件作为图示容器，文字组件支持快速修改。

    - id: next-plan
      title: 下一步计划
      parent: root
      children: []
      status:
        content: draft
        source: inferred
        display: visible
      sources:
        - source_id: dialog-001
          note: 基于 demo 开发要求推断下一阶段。
      summary: 将 demo 扩展为完整的树形编辑、SVG 细节编辑和数据校验流程。
      speaker_note: 最后收束到下一阶段可以继续推进的能力。

navigation:
  mode: tree
  linear_route:
    - root
    - progress
    - data-model
    - presentation-model
    - next-plan
  overrides:
    - node_id: presentation-model
      right: next-plan

