report:
  id: 2026-05-17-weekly-progress
  title: ReportWebShow Demo 汇报
  type: progress_report
  created_at: 2026-05-17T15:30:00+08:00
  updated_at: 2026-05-17T15:30:00+08:00
  audience: 导师
  presenter: 研究生

sources:
  - source_id: dialog-001
    note: 用户确认 demo 需要呈现清晰、功能明确、数据结构干净。
  - source_id: design-doc-001
    note: 设计文档确立 reports、patches、revision、树形导航和本地保存规则。

story_tree:
  root: root
  nodes:
    - id: root
      title: 汇报入口
      parent: null
      children:
        - progress
        - workflow-validation
        - next-plan
      status:
        content: reviewed
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 项目定位来自设计文档。
      summary: 用一个本地 Web 汇报板展示数据树、呈现页和可保存编辑。
      speaker_note: 从项目目标切入，说明 demo 不是 PPT，而是可编辑的数据驱动展示。

    - id: progress
      title: 当前进展
      parent: root
      children:
        - data-model
        - presentation-model
        - node-effects
      status:
        content: reviewed
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 当前进展来自已沉淀的设计文档。
      summary: 已确立 reports + patches 的数据层，以及节点到画布的呈现关系。
      speaker_note: 先讲已经固定下来的结构，再进入数据和呈现两个分支。

    - id: data-model
      title: 数据层结构
      parent: progress
      children:
        - revision-chain
        - schema-validation
      status:
        content: reviewed
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 本节点总结本地保存体系规范。
      summary: report_id 区分汇报项目，revision_id 区分保存版本，patches 记录用户修改。
      speaker_note: 强调基础数据不被前端普通编辑覆盖。

    - id: revision-chain
      title: Revision 链路
      parent: data-model
      children:
        - patch-solidify
      status:
        content: draft
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: revision 父链来自本地保存规则。
      summary: 每次保存都生成一个 revision，并通过 parent_revision 保留可回溯链路。
      speaker_note: 用这个节点展示当前节点的直接子节点和更远一层孙节点。

    - id: patch-solidify
      title: Patch 固化
      parent: revision-chain
      children: []
      status:
        content: draft
        source: inferred
        display: visible
      sources:
        - source_id: dialog-001
          note: 基于后续 workflow 推断 patch 固化需求。
      summary: 将前端修订整理为可复用 patch，必要时回写到稳定数据文档。
      speaker_note: 该节点用于展示超过一层父子关系后的远离态。

    - id: schema-validation
      title: Schema 校验
      parent: data-model
      children: []
      status:
        content: draft
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: schema 校验来自数据结构说明。
      summary: 用 schema 约束 report、page、component 和 revision patch 的基本字段。
      speaker_note: 说明数据校验会作为汇报生成和前端保存之间的稳定边界。

    - id: presentation-model
      title: 呈现侧结构
      parent: progress
      children:
        - node-navigator
      status:
        content: draft
        source: sourced
        display: visible
      sources:
        - source_id: design-doc-001
          note: 本节点总结呈现侧模块。
      summary: 一个树节点对应一个呈现页，页面由 text block 和 svg block 组成。
      speaker_note: 说明 SVG 组件作为图示容器，文字组件支持快速修改。

    - id: node-navigator
      title: 节点导航呈现
      parent: presentation-model
      children: []
      status:
        content: draft
        source: inferred
        display: visible
      sources:
        - source_id: dialog-001
          note: 用户要求独立的轻量树状节点呈现模块。
      summary: 用 D3 hierarchy 生成层级关系，再由轻量 SVG + 命中层完成节点呈现、点击和悬浮提示。
      speaker_note: 强调节点模块已经从主应用中隔离，可以单独验证交互和视觉规则。

    - id: node-effects
      title: 节点效果规则
      parent: progress
      children: []
      status:
        content: draft
        source: inferred
        display: visible
      sources:
        - source_id: dialog-001
          note: 用户明确了主要、次要、远离三档节点效果。
      summary: 当前节点放大并居中，直接相关节点保持正常大小，远离节点缩小并降低透明度。
      speaker_note: 用该节点展示非最近兄弟节点的远离态。

    - id: workflow-validation
      title: 流程验证
      parent: root
      children: []
      status:
        content: draft
        source: inferred
        display: visible
      sources:
        - source_id: dialog-001
          note: 基于 demo 闭环验证目标补充。
      summary: 串联数据读取、节点切换、编辑保存、revision 回撤和最终展示检查。
      speaker_note: 该节点作为 root 下的中间兄弟节点，帮助展示最近兄弟与非最近兄弟的差异。

    - id: next-plan
      title: 下一步计划
      parent: root
      children: []
      status:
        content: draft
        source: inferred
        display: visible
      sources:
        - source_id: dialog-001
          note: 基于 demo 开发要求推断下一阶段。
      summary: 将 demo 扩展为完整的树形编辑、SVG 细节编辑和数据校验流程。
      speaker_note: 最后收束到下一阶段可以继续推进的能力。

navigation:
  mode: tree
  linear_route:
    - root
    - progress
    - data-model
    - revision-chain
    - patch-solidify
    - schema-validation
    - presentation-model
    - node-navigator
    - node-effects
    - workflow-validation
    - next-plan
  overrides:
    - node_id: presentation-model
      right: node-navigator

